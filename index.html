<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RUniSmart</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/CKkDCgfP/rabb-c-dkarkh-xm-lw-chare-yn-laea-sxb.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Bai Jamjuree', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
    .app-container { display: flex; flex-direction: column; min-height: 100vh; }
    .sidebar { background: #ffffff; border-bottom: 1px solid #f1f5f9; width: 100%; padding: 20px; z-index: 10; }
    .main-content { padding: 15px; flex-grow: 1; }
    @media (min-width: 1024px) { 
      .app-container { flex-direction: row; }
      .sidebar { width: 400px; height: 100vh; position: fixed; border-right: 1px solid #f1f5f9; border-bottom: none; overflow-y: auto; } 
      .main-content { margin-left: 400px; padding: 40px; } 
    }
    .card-border { border: 1px solid #fee2e2; border-radius: 20px; overflow: hidden; background: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    .input-pro { border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; font-size: 15px; width: 100%; background: #fff; transition: 0.2s; }
    .input-pro:focus { border-color: #ef4444; outline: none; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1); }
    .btn-save { background: #10b981; color: white; border-radius: 10px; font-weight: 600; padding: 16px; width: 100%; font-size: 18px; transition: 0.3s; cursor: pointer; }
    .btn-save:hover { background: #059669; }
    th { font-weight: 600; color: #64748b; padding: 15px; border-bottom: 1px solid #f8fafc; text-align: left; font-size: 13px; text-transform: uppercase; white-space: nowrap; }
    td { padding: 15px; border-bottom: 1px solid #f8fafc; font-size: 14px; color: #334155; }
    .day-header { color: #0f172a; font-weight: 700; font-size: 15px; padding-bottom: 12px; border-bottom: 2px solid #f1f5f9; margin-bottom: 15px; text-transform: uppercase; }
    .day-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
    .day-selector input:checked + span { background: #ef4444; color: white; border-color: #ef4444; }
    .day-selector span { display: block; padding: 6px 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 12px; font-weight: 500; background: #f8fafc; transition: 0.2s; cursor: pointer; }
    .visual-grid-container { min-width: 900px; }
    .modal-overlay { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); }
  </style>
</head>
<body>

  <!-- Modal ลบ -->
  <div id="deleteModal" class="fixed inset-0 z-[100] flex items-center justify-center hidden modal-overlay">
    <div class="bg-white w-[90%] max-w-sm p-8 rounded-3xl shadow-2xl text-center">
      <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="alert-triangle"></i></div>
      <h3 class="text-xl font-bold" data-th="ยืนยันการลบ?" data-en="Confirm Deletion?">ยืนยันการลบ?</h3>
      <div class="flex gap-4 mt-8">
        <button onclick="closeModal()" class="flex-1 text-slate-500 font-bold" data-th="ยกเลิก" data-en="Cancel">ยกเลิก</button>
        <button id="confirmDeleteBtn" class="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold" data-th="ลบออก" data-en="Delete">ลบออก</button>
      </div>
    </div>
  </div>

  <!-- Modal ตั้งค่าอัตโนมัติ -->
  <div id="settingsModal" class="fixed inset-0 z-[100] flex items-center justify-center hidden modal-overlay">
    <div class="bg-white w-[90%] max-w-md p-8 rounded-3xl shadow-2xl">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2"><i data-lucide="settings" class="w-5 h-5"></i> <span data-th="ตั้งค่าระบบอัตโนมัติ" data-en="Automation Settings">ตั้งค่าระบบอัตโนมัติ</span></h3>
        <button onclick="closeSettings()"><i data-lucide="x" class="text-slate-400"></i></button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="text-[11px] font-bold text-slate-500 uppercase" data-th="วันที่เริ่มแจ้งเตือน" data-en="Start Date">วันที่เริ่มแจ้งเตือน</label>
          <input type="date" id="setStartDate" class="input-pro mt-1">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-[11px] font-bold text-slate-500 uppercase" data-th="เวลาแจ้งเรียน" data-en="Class Alert Time">เวลาแจ้งเรียน</label>
            <select id="setClassHour" class="input-pro mt-1">
               <option value="6">06:00</option><option value="7">07:00</option>
               <option value="8">08:00</option><option value="9">09:00</option>
            </select>
          </div>
          <div>
            <label class="text-[11px] font-bold text-slate-500 uppercase" data-th="เวลาแจ้งสอบ" data-en="Exam Alert Time">เวลาแจ้งสอบ</label>
            <select id="setExamHour" class="input-pro mt-1">
               <option value="6">06:00</option><option value="7">07:00</option>
               <option value="8">08:00</option><option value="9">09:00</option>
            </select>
          </div>
        </div>
        <div>
           <label class="text-[11px] font-bold text-slate-500 uppercase" data-th="ภาคเรียนที่ให้แจ้งเตือน" data-en="Active Term Alert">ภาคเรียนที่ให้แจ้งเตือน</label>
           <input type="text" id="setNotifySemester" class="input-pro mt-1 bg-slate-50" readonly>
           <p class="text-[10px] text-rose-500 mt-1" data-th="* ระบบจะยึดตามภาคเรียนที่คุณเลือกอยู่ปัจจุบัน" data-en="* Based on your currently selected term.">* ระบบจะยึดตามภาคเรียนที่คุณเลือกอยู่ปัจจุบัน</p>
        </div>
      </div>
      <button onclick="saveSettingsBtn()" id="saveSetBtn" class="w-full py-3 mt-6 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-bold flex items-center justify-center gap-2">
        <i data-lucide="save" class="w-4 h-4"></i> <span data-th="บันทึกการตั้งค่า" data-en="Save Settings">บันทึกการตั้งค่า</span>
      </button>
    </div>
  </div>

  <div class="app-container">
    <aside class="sidebar flex flex-col">
      <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-rose-500 rounded-lg flex items-center justify-center text-white"><i data-lucide="book-open" class="w-5 h-5"></i></div>
          <h1 class="text-lg font-bold text-slate-800 uppercase">RUniSmart</h1>
        </div>
        <div class="flex gap-2">
          <button onclick="openSettings()" class="p-2 bg-slate-100 rounded-lg text-slate-600 hover:bg-slate-200"><i data-lucide="settings" class="w-4 h-4"></i></button>
          <button onclick="toggleLang()" id="langBtn" class="text-xs font-bold bg-slate-100 px-3 py-1 rounded-md text-slate-600">EN</button>
        </div>
      </div>

      <div class="mb-6">
        <div id="clock" class="text-4xl lg:text-5xl font-bold tracking-tighter text-slate-900">00:00:00</div>
        <div id="date" class="text-xs font-semibold text-rose-400 uppercase tracking-widest mt-1">Loading...</div>
      </div>
      
      <form id="mainForm" class="space-y-4">
        <input type="hidden" name="targetRow" id="targetRow" value="0">
        <input type="hidden" name="semester" id="semesterHidden">
        
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase" data-th="ปีการศึกษา" data-en="Year">ปีการศึกษา</label>
            <select id="yearSelect" class="input-pro font-bold text-rose-600 bg-rose-50" onchange="loadData()">
              <option value="2567">2567</option><option value="2568">2568</option>
              <option value="2569" selected>2569</option><option value="2570">2570</option>
            </select>
          </div>
          <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase" data-th="ภาคเรียน" data-en="Term">ภาคเรียน</label>
            <select id="termSelect" class="input-pro font-bold text-rose-600 bg-rose-50" onchange="loadData()">
              <option value="ภาคเรียนที่ 1" data-th="ภาคเรียนที่ 1" data-en="Term 1">ภาคเรียนที่ 1</option>
              <option value="ภาคเรียนที่ 2" data-th="ภาคเรียนที่ 2" data-en="Term 2">ภาคเรียนที่ 2</option>
              <option value="ภาคฤดูร้อน" data-th="ภาคฤดูร้อน" data-en="Summer">ภาคฤดูร้อน</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-3 gap-2">
          <div class="col-span-1"><input type="text" name="courseId" id="courseId" placeholder="รหัสวิชา" data-th="รหัสวิชา" data-en="Course ID" class="input-pro font-bold uppercase" required></div>
          <div class="col-span-2"><input type="text" name="courseName" id="courseName" placeholder="ชื่อรายวิชา" data-th="ชื่อรายวิชา" data-en="Course Name" class="input-pro" required></div>
        </div>
        
        <div>
          <label class="text-[10px] font-bold text-slate-500 uppercase" data-th="วันเรียน" data-en="Study Days">วันเรียน</label>
          <div class="day-selector">
            <label><input type="checkbox" name="days" value="วันจันทร์" class="hidden"><span data-th="จ." data-en="Mon">จ.</span></label>
            <label><input type="checkbox" name="days" value="วันอังคาร" class="hidden"><span data-th="อ." data-en="Tue">อ.</span></label>
            <label><input type="checkbox" name="days" value="วันพุธ" class="hidden"><span data-th="พ." data-en="Wed">พ.</span></label>
            <label><input type="checkbox" name="days" value="วันพฤหัสบดี" class="hidden"><span data-th="พฤ." data-en="Thu">พฤ.</span></label>
            <label><input type="checkbox" name="days" value="วันศุกร์" class="hidden"><span data-th="ศ." data-en="Fri">ศ.</span></label>
            <label><input type="checkbox" name="days" value="วันเสาร์" class="hidden"><span data-th="ส." data-en="Sat">ส.</span></label>
            <label><input type="checkbox" name="days" value="วันอาทิตย์" class="hidden"><span data-th="อา." data-en="Sun">อา.</span></label>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <div><label class="text-[10px] font-bold text-slate-500" data-th="เวลาเริ่ม" data-en="Start Time">เวลาเริ่ม</label><input type="time" name="startTime" id="startTime" class="input-pro"></div>
          <div><label class="text-[10px] font-bold text-slate-500" data-th="เวลาจบ" data-en="End Time">เวลาจบ</label><input type="time" name="endTime" id="endTime" class="input-pro"></div>
        </div>

        <div class="grid grid-cols-2 gap-2">
          <input type="text" name="room" id="room" placeholder="ห้องเรียน" data-th="ห้องเรียน" data-en="Room" class="input-pro">
          <input type="text" name="teacher" id="teacher" placeholder="ชื่อผู้สอน" data-th="ชื่อผู้สอน" data-en="Instructor" class="input-pro">
        </div>
        
        <div>
          <label class="text-[10px] font-bold text-slate-500 uppercase" data-th="สีประจำวิชา" data-en="Theme Color">สีประจำวิชา</label>
          <select name="colorTheme" id="colorTheme" class="input-pro">
            <option value="bg-blue-50 border-blue-200 text-blue-800" data-th="สีฟ้า" data-en="Blue">สีฟ้า</option>
            <option value="bg-rose-50 border-rose-200 text-rose-800" data-th="สีชมพู" data-en="Pink">สีชมพู</option>
            <option value="bg-emerald-50 border-emerald-200 text-emerald-800" data-th="สีเขียว" data-en="Green">สีเขียว</option>
            <option value="bg-amber-50 border-amber-200 text-amber-800" data-th="สีเหลือง" data-en="Yellow">สีเหลือง</option>
            <option value="bg-purple-50 border-purple-200 text-purple-800" data-th="สีม่วง" data-en="Purple">สีม่วง</option>
          </select>
        </div>

        <div class="pt-4 border-t border-slate-100 space-y-2">
          <p class="text-[10px] font-bold text-rose-500 uppercase text-center" data-th="กำหนดการสอบ" data-en="Exam Schedule">กำหนดการสอบ</p>
          <input type="date" name="examDate" id="examDate" class="input-pro">
          <div class="grid grid-cols-2 gap-2">
            <input type="time" name="examStartTime" id="examStartTime" class="input-pro">
            <input type="time" name="examEndTime" id="examEndTime" class="input-pro">
          </div>
          <input type="text" name="examRoom" id="examRoom" placeholder="สถานที่สอบ/ห้องสอบ" data-th="สถานที่สอบ/ห้องสอบ" data-en="Exam Room" class="input-pro mt-2">
        </div>
        
        <div class="flex items-center justify-between p-3 bg-red-50 rounded-xl border border-red-100 mt-2">
          <div class="flex items-center gap-2">
            <i data-lucide="stop-circle" class="w-4 h-4 text-red-500"></i>
            <span class="text-sm font-bold text-red-700" data-th="ปิดคลาสแล้ว (งดแจ้งเตือนเรียน)" data-en="Class Closed (Mute Study Alert)">ปิดคลาสแล้ว (งดแจ้งเตือนเรียน)</span>
          </div>
          <input type="checkbox" name="isClosed" id="isClosed" value="true" class="w-5 h-5 accent-red-500 cursor-pointer">
        </div>

        <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100 mt-2">
          <div class="flex items-center gap-2">
            <i data-lucide="message-circle" class="w-4 h-4 text-emerald-500"></i>
            <span class="text-sm font-bold text-slate-700" data-th="แจ้งเตือนลง LINE" data-en="LINE Notification">แจ้งเตือนลง LINE</span>
          </div>
          <input type="checkbox" name="notifyLine" id="notifyLine" value="true" checked class="w-5 h-5 accent-emerald-500 cursor-pointer">
        </div>
        <button type="submit" id="subBtn" class="btn-save flex items-center justify-center gap-2 mt-2 shadow-lg"><i data-lucide="save"></i> <span data-th="บันทึกข้อมูล" data-en="Save Data">บันทึกข้อมูล</span></button>
      </form>
    </aside>

    <main class="main-content space-y-6">
      
      <!-- 🎓 แดชบอร์ดตารางเรียน -->
      <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
        <div>
          <h2 class="text-2xl lg:text-3xl font-bold text-slate-800 tracking-tight" data-th="แดชบอร์ดตารางเรียน" data-en="Class Dashboard">แดชบอร์ดตารางเรียน</h2>
          <div class="relative mt-3 w-full md:w-80">
            <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 w-4 h-4"></i>
            <input type="text" id="searchInput" onkeyup="filterTable('dataTable', 'searchInput')" placeholder="ค้นหาวิชาเรียน..." data-th="ค้นหาวิชาเรียน..." data-en="Search classes..." class="input-pro pl-10">
          </div>
        </div>
        <button onclick="downloadImg()" class="p-3 bg-rose-50 text-rose-600 rounded-xl border border-rose-200 hover:bg-rose-100 transition flex items-center gap-2">
          <i data-lucide="download" class="w-5 h-5"></i> <span class="text-sm font-bold" data-th="บันทึกภาพตารางเรียน" data-en="Save Class Image">บันทึกภาพตารางเรียน</span>
        </button>
      </header>

      <div class="overflow-x-auto card-border">
        <div id="captureArea" class="p-6 bg-white visual-grid-container">
          <div class="grid grid-cols-7 gap-4">
            <div class="text-center"><p class="day-header">MON</p><div id="Mon" class="space-y-2"></div></div>
            <div class="text-center"><p class="day-header">TUE</p><div id="Tue" class="space-y-2"></div></div>
            <div class="text-center"><p class="day-header">WED</p><div id="Wed" class="space-y-2"></div></div>
            <div class="text-center"><p class="day-header">THU</p><div id="Thu" class="space-y-2"></div></div>
            <div class="text-center"><p class="day-header">FRI</p><div id="Fri" class="space-y-2"></div></div>
            <div class="text-center"><p class="day-header">SAT</p><div id="Sat" class="space-y-2"></div></div>
            <div class="text-center"><p class="day-header">SUN</p><div id="Sun" class="space-y-2"></div></div>
          </div>
        </div>
      </div>

      <div class="card-border overflow-hidden bg-white mb-10">
        <div class="overflow-x-auto">
          <table class="w-full text-left" id="dataTable">
            <thead class="bg-slate-50"><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <hr class="border-t-2 border-slate-100 my-8">

      <!-- 📝 แดชบอร์ดตารางสอบ -->
      <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mt-6">
        <div>
          <h2 class="text-2xl lg:text-3xl font-bold text-slate-800 tracking-tight" data-th="แดชบอร์ดตารางสอบ" data-en="Exam Dashboard">แดชบอร์ดตารางสอบ</h2>
          <div class="relative mt-3 w-full md:w-80">
            <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 w-4 h-4"></i>
            <input type="text" id="searchExam" onkeyup="filterTable('examTable', 'searchExam')" placeholder="ค้นหาวิชาสอบ..." data-th="ค้นหาวิชาสอบ..." data-en="Search exams..." class="input-pro pl-10">
          </div>
        </div>
      </header>

      <div class="card-border overflow-hidden bg-white">
        <div class="overflow-x-auto">
          <table class="w-full text-left" id="examTable">
            <thead class="bg-slate-50"><tr id="examTableHead"></tr></thead>
            <tbody id="examTableBody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxOVR5w72VZSIx280WUbzF9dyxlAw-zJprAVqzE54sJFQWjLzM-41W3JqfHNDqkQLOrqQ/exec";

    lucide.createIcons();
    let globalData = [];
    let deleteTargetRow = null;
    let deleteTargetId = null;
    let currentLang = 'th';

    function getSemesterStr() {
      // สำหรับดึงค่าจริง โดยอาจจะต้องแปลงค่า dropdown กลับเป็นภาษาไทยเพื่อให้ฝั่ง Google Sheet บันทึกถูก tab เสมอ
      let termVal = document.getElementById('termSelect').options[document.getElementById('termSelect').selectedIndex].getAttribute('data-th') || document.getElementById('termSelect').value;
      return termVal + " " + document.getElementById('yearSelect').value;
    }

    function runClock() {
      const now = new Date();
      document.getElementById('clock').innerText = now.toLocaleTimeString(currentLang === 'th' ? 'th-TH' : 'en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      document.getElementById('date').innerText = now.toLocaleDateString(currentLang === 'th' ? 'th-TH' : 'en-US', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' });
    }

    async function loadData() {
      const sem = getSemesterStr();
      document.getElementById('semesterHidden').value = sem;
      document.getElementById('targetRow').value = "0";
      
      const loadingTxt = currentLang === 'th' ? "กำลังโหลดข้อมูล..." : "Loading Data...";
      document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="p-10 text-center text-slate-400">${loadingTxt}</td></tr>`;
      document.getElementById('examTableBody').innerHTML = `<tr><td colspan="7" class="p-10 text-center text-slate-400">${loadingTxt}</td></tr>`;
      
      try {
        const response = await fetch(`${API_URL}?action=getData&semester=${encodeURIComponent(sem)}`);
        const data = await response.json();
        drawUI(data);
      } catch (error) {
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="p-10 text-center text-red-500">Error Loading Data</td></tr>`;
      }
    }

    window.onload = () => { 
      setInterval(runClock, 1000); 
      runClock(); 
      applyLanguage();
      loadData(); 
    };

    function toggleLang() {
      currentLang = currentLang === 'th' ? 'en' : 'th';
      document.getElementById('langBtn').innerText = currentLang === 'th' ? 'EN' : 'TH';
      applyLanguage();
      drawUI(globalData); 
    }

    function applyLanguage() {
      document.querySelectorAll('[data-th]').forEach(el => {
        if(el.tagName === 'INPUT' && el.type === 'text') {
          el.placeholder = el.getAttribute(`data-${currentLang}`);
        } else if (el.tagName === 'OPTION') {
          el.innerText = el.getAttribute(`data-${currentLang}`);
        } else {
          el.innerText = el.getAttribute(`data-${currentLang}`);
        }
      });
      runClock();
    }

    function filterTable(tableId, inputId) {
      const input = document.getElementById(inputId).value.toUpperCase();
      const rows = document.getElementById(tableId).getElementsByTagName("tbody")[0].getElementsByTagName("tr");
      for (let row of rows) { row.style.display = row.innerText.toUpperCase().includes(input) ? "" : "none"; }
    }

    function formatBE(dateStr) {
      if (!dateStr || dateStr === '-') return '-';
      const d = new Date(dateStr);
      if(currentLang === 'th') return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${(d.getFullYear()+543).toString()}`;
      return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
    }

    function drawUI(data) {
      if(!data || !Array.isArray(data)) return;
      globalData = data;
      drawClassTable(data);
      drawExamTable(data);
      drawVisual(data);
    }

    function drawClassTable(data) {
      const body = document.getElementById('tableBody');
      const head = document.getElementById('tableHead');
      const thLabels = currentLang === 'th' 
        ? ['วันเรียน', 'เวลา', 'รหัส', 'วิชา', 'ห้อง', 'ผู้สอน', 'จัดการ']
        : ['Days', 'Time', 'Code', 'Subject', 'Room', 'Instructor', 'Action'];
      
      head.innerHTML = thLabels.map(h => `<th>${h}</th>`).join('');
      
      if(data.length <= 1) {
         body.innerHTML = `<tr><td colspan="7" class="p-10 text-center text-slate-400">${currentLang === 'th' ? 'ยังไม่มีข้อมูลในภาคเรียนนี้' : 'No data in this semester.'}</td></tr>`; return;
      }

      body.innerHTML = data.slice(1).map((r, i) => {
        const isClosed = r[10] === "ปิดคลาส";
        const rowStyle = isClosed ? "opacity-60 bg-slate-100" : "hover:bg-slate-50";
        const badgeTxt = currentLang === 'th' ? 'ปิดคลาสแล้ว' : 'Closed';
        const badge = isClosed ? `<span class="bg-red-500 text-white px-2 py-0.5 rounded text-[10px] ml-2">${badgeTxt}</span>` : "";

        return `
        <tr id="row-${i+2}" class="${rowStyle} transition-all">
          <td class="font-bold text-slate-800 text-xs max-w-[100px] truncate" title="${r[0]}">${r[0]}</td>
          <td class="text-slate-500 font-medium whitespace-nowrap">${r[1]}</td>
          <td class="text-slate-400 font-mono text-xs">${r[2]}</td>
          <td class="font-bold text-slate-800 uppercase">${r[3]} ${badge}</td>
          <td class="text-slate-500 text-xs">${r[4]}</td>
          <td class="text-slate-500 text-xs">${r[7] || '-'}</td>
          <td class="p-2 text-right whitespace-nowrap">
            <button onclick="editItem(${i+2})" class="text-emerald-500 p-2 hover:bg-emerald-50 rounded-lg"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
            <button onclick="openModal(${i+2}, '${r[2]}')" class="text-rose-500 p-2 hover:bg-rose-50 rounded-lg"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
          </td>
        </tr>
      `}).join('');
      lucide.createIcons();
    }

    function drawExamTable(data) {
      const body = document.getElementById('examTableBody');
      const head = document.getElementById('examTableHead');
      const thLabels = currentLang === 'th' 
        ? ['วันที่สอบ', 'เวลาสอบ', 'รหัส', 'วิชา', 'สถานที่สอบ', 'ผู้สอน', 'แก้ไข']
        : ['Exam Date', 'Time', 'Code', 'Subject', 'Exam Room', 'Instructor', 'Edit'];
      
      head.innerHTML = thLabels.map(h => `<th>${h}</th>`).join('');
      
      const examData = data.slice(1).map((r, idx) => ({r, originalIdx: idx + 2})).filter(item => item.r[5] && item.r[5] !== '-' && item.r[5].trim() !== '');

      if(examData.length === 0) {
         body.innerHTML = `<tr><td colspan="7" class="p-10 text-center text-slate-400">${currentLang === 'th' ? 'ยังไม่มีข้อมูลการสอบในภาคเรียนนี้' : 'No exam data in this semester.'}</td></tr>`; return;
      }

      examData.sort((a, b) => new Date(a.r[5]) - new Date(b.r[5]));

      body.innerHTML = examData.map(item => {
        const r = item.r; const i = item.originalIdx;
        const examRoom = r[9] || r[4] || '-'; 
        
        return `
        <tr class="hover:bg-slate-50 transition-all">
          <td class="text-rose-500 font-bold whitespace-nowrap">${formatBE(r[5])}</td>
          <td class="text-slate-500 text-xs whitespace-nowrap">${r[6] || '-'}</td>
          <td class="text-slate-400 font-mono text-xs">${r[2]}</td>
          <td class="font-bold text-slate-800 uppercase">${r[3]}</td>
          <td class="text-slate-500 text-xs font-medium">${examRoom}</td>
          <td class="text-slate-500 text-xs">${r[7] || '-'}</td>
          <td class="p-2 text-right whitespace-nowrap">
            <button onclick="editItem(${i})" class="text-emerald-500 p-2 hover:bg-emerald-50 rounded-lg"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
          </td>
        </tr>
      `}).join('');
      lucide.createIcons();
    }

    function drawVisual(data) {
      const mapTH = {'วันจันทร์': 'Mon', 'วันอังคาร': 'Tue', 'วันพุธ': 'Wed', 'วันพฤหัสบดี': 'Thu', 'วันศุกร์': 'Fri', 'วันเสาร์': 'Sat', 'วันอาทิตย์': 'Sun'};
      const mapEN = {'Mon': 'Mon', 'Tue': 'Tue', 'Wed': 'Wed', 'Thu': 'Thu', 'Fri': 'Fri', 'Sat': 'Sat', 'Sun': 'Sun'};
      ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].forEach(id => document.getElementById(id).innerHTML = '');
      
      if(data.length <= 1) return;
      data.slice(1).forEach(r => {
        const rowDays = r[0].split(', ');
        const theme = r[8] || 'bg-rose-50 border-rose-200 text-rose-800'; 
        const isClosed = r[10] === "ปิดคลาส";
        const opacityStyle = isClosed ? "opacity-50" : ""; 
        const closedTxt = currentLang === 'th' ? '(จบ)' : '(Closed)';
        
        rowDays.forEach(d => {
          let target = mapTH[d.trim()] || mapEN[d.trim()];
          if(target) {
            const div = document.createElement('div');
            div.className = `p-3 border rounded-xl text-[10px] shadow-sm flex flex-col gap-1 ${theme} ${opacityStyle}`;
            div.innerHTML = `
              <p class="font-bold truncate uppercase text-xs">${r[3]} ${isClosed ? closedTxt : ''}</p>
              <div class="flex justify-between items-center opacity-80"><span class="font-bold">${r[1]}</span><span>${r[4] || ''}</span></div>
            `;
            document.getElementById(target).appendChild(div);
          }
        });
      });
    }

    document.getElementById('mainForm').onsubmit = async function(e) {
      e.preventDefault();
      const btn = document.getElementById('subBtn');
      btn.disabled = true; btn.style.opacity = '0.5';
      
      const formData = Object.fromEntries(new FormData(this).entries());
      const daysCheckboxes = document.querySelectorAll('input[name="days"]:checked');
      // เก็บค่าเป็นภาษาไทยเสมอ เพื่อให้หาเจอในตารางได้ง่ายๆ แม้เปลี่ยนภาษาหน้าเว็บ
      formData.days = Array.from(daysCheckboxes).map(cb => cb.value);
      formData.notifyLine = document.getElementById('notifyLine').checked;
      formData.isClosed = document.getElementById('isClosed').checked;
      
      // ดึง Semester กลับไปเป็นภาษาไทยเสมอเพื่อหา Sheet ให้เจอ
      formData.semester = document.getElementById('termSelect').options[document.getElementById('termSelect').selectedIndex].getAttribute('data-th') + " " + document.getElementById('yearSelect').value;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'save', data: formData })
        });
        const result = await response.json();
        
        if(result.status === 'success') {
          drawUI(result.data); 
          document.getElementById('targetRow').value = "0";
          document.getElementById('courseId').value = ""; document.getElementById('courseName').value = "";
          document.querySelectorAll('input[name="days"]').forEach(cb => cb.checked = false);
          document.getElementById('isClosed').checked = false; 
        } else alert("เกิดข้อผิดพลาด: " + result.message);
      } catch (error) { alert("ไม่สามารถเชื่อมต่อ API ได้"); }
      
      btn.disabled = false; btn.style.opacity = '1'; lucide.createIcons();
    };

    function editItem(rowIdx) {
      const r = globalData[rowIdx-1]; 
      document.getElementById('targetRow').value = rowIdx;
      document.getElementById('courseId').value = r[2];
      document.getElementById('courseName').value = r[3];
      const dayArr = r[0].split(', ');
      document.querySelectorAll('input[name="days"]').forEach(cb => cb.checked = dayArr.includes(cb.value));
      const t = r[1].split('-'); document.getElementById('startTime').value = t[0] || ''; document.getElementById('endTime').value = t[1] || '';
      document.getElementById('room').value = r[4]; document.getElementById('examDate').value = r[5] || '';
      const et = r[6] ? r[6].split('-') : []; document.getElementById('examStartTime').value = et[0] || ''; document.getElementById('examEndTime').value = et[1] || '';
      document.getElementById('teacher').value = r[7] || '';
      if(r[8]) document.getElementById('colorTheme').value = r[8];
      document.getElementById('examRoom').value = r[9] || '';
      document.getElementById('isClosed').checked = (r[10] === 'ปิดคลาส');
      
      if(window.innerWidth < 1024) window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function openModal(rowIdx, id) { deleteTargetRow = rowIdx; deleteTargetId = id; document.getElementById('deleteModal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('deleteModal').classList.add('hidden'); }
    
    document.getElementById('confirmDeleteBtn').onclick = async function() {
      const btn = this; 
      btn.innerHTML = currentLang === 'th' ? "กำลังลบ..." : "Deleting..."; 
      btn.disabled = true;
      const semester = getSemesterStr();
      const isNotify = document.getElementById('notifyLine').checked; 
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'delete', rowIdx: deleteTargetRow, courseId: deleteTargetId, semester: semester, isNotify: isNotify })
        });
        const result = await response.json();
        
        if(result.status === 'success') {
          closeModal();
          drawUI(result.data);
        }
      } catch (error) { alert("เกิดข้อผิดพลาดในการลบข้อมูล"); }
      btn.innerText = currentLang === 'th' ? "ลบออก" : "Delete"; btn.disabled = false;
    };

    async function downloadImg() {
      const captureArea = document.querySelector("#captureArea");
      if (!captureArea) return;
      const btn = event.currentTarget;
      const oldHtml = btn.innerHTML;
      btn.innerHTML = currentLang === 'th' ? `รอสักครู่...` : `Wait...`; btn.disabled = true;

      const originalPadding = captureArea.style.padding;
      captureArea.style.padding = '20px';

      try {
        const canvas = await html2canvas(captureArea, { scale: 2, backgroundColor: "#ffffff", useCORS: true });
        captureArea.style.padding = originalPadding;
        btn.innerHTML = oldHtml; btn.disabled = false;
        
        const imgUrl = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.download = `ตารางเรียน_${document.getElementById('termSelect').value}.png`;
        link.href = imgUrl; link.click();
      } catch (err) {
        captureArea.style.padding = originalPadding;
        btn.innerHTML = oldHtml; btn.disabled = false;
        alert("เกิดข้อผิดพลาดในการบันทึกภาพค่ะ");
      }
    }

    async function openSettings() {
      document.getElementById('setNotifySemester').value = getSemesterStr();
      document.getElementById('settingsModal').classList.remove('hidden');
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'getSettings' })
        });
        const result = await response.json();
        if(result.status === 'success' && result.data) {
           const props = result.data;
           if(props.START_DATE) document.getElementById('setStartDate').value = props.START_DATE;
           if(props.CLASS_HOUR) document.getElementById('setClassHour').value = props.CLASS_HOUR;
           if(props.EXAM_HOUR) document.getElementById('setExamHour').value = props.EXAM_HOUR;
        }
      } catch (e) { console.error("Error loading settings"); }
    }
    
    function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
    
    async function saveSettingsBtn() {
      const btn = document.getElementById('saveSetBtn'); 
      const origHtml = btn.innerHTML;
      btn.innerText = currentLang === 'th' ? "กำลังบันทึก..." : "Saving..."; btn.disabled = true;
      const config = {
        startDate: document.getElementById('setStartDate').value,
        classHour: document.getElementById('setClassHour').value,
        examHour: document.getElementById('setExamHour').value,
        notifySemester: document.getElementById('setNotifySemester').value
      };
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'saveSettings', data: config })
        });
        const result = await response.json();
        if(result.status === 'success') {
          alert(currentLang === 'th' ? "บันทึกการตั้งค่าระบบแจ้งเตือนอัตโนมัติสำเร็จ!" : "Automation Settings Saved!");
          closeSettings();
        }
      } catch (e) { alert("เกิดข้อผิดพลาดในการบันทึก"); }
      
      btn.innerHTML = origHtml; btn.disabled = false; lucide.createIcons();
    }
  </script>
</body>
</html>
